<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub — TrungKien Dang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/font-awesome.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="container" style="padding-top: 80px; padding-bottom: 40px;">
    <a href="/" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;margin-bottom:32px;color:var(--color-text-secondary)"><i class="fa fa-arrow-left"></i> Back to home</a>
    <h1 class="section-title">GitHub</h1>
    <div class="github-stats">
      <div class="stat-card">
        <i class="fa fa-code-fork"></i>
        <div class="stat-value" id="public-repos">--</div>
        <div class="stat-label">Public Repos</div>
      </div>
      <div class="stat-card">
        <i class="fa fa-star"></i>
        <div class="stat-value" id="total-stars">--</div>
        <div class="stat-label">Total Stars</div>
      </div>
      <div class="stat-card">
        <i class="fa fa-users"></i>
        <div class="stat-value" id="followers">--</div>
        <div class="stat-label">Followers</div>
      </div>
    </div>
    <div class="repos-list" id="repos-list"></div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
