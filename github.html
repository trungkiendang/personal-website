<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub — TrungKien Dang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/normalize.css" />
  <link rel="stylesheet" href="css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/font-awesome.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body style="padding-top:0">
  <div class="container" style="padding:60px 0">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
        <a href="/"><i class="fa fa-arrow-left"></i> Back to home</a>
        <h2 class="section-title" style="margin-top:20px">GitHub</h2>
      </div>
    </div>
    <div class="row">
      <div class="col-sm-4">
        <div class="stat-card">
          <i class="fa fa-code-fork"></i>
          <div class="stat-value" id="public-repos">--</div>
          <div class="stat-label">Public Repos</div>
        </div>
      </div>
      <div class="col-sm-4">
        <div class="stat-card">
          <i class="fa fa-star"></i>
          <div class="stat-value" id="total-stars">--</div>
          <div class="stat-label">Total Stars</div>
        </div>
      </div>
      <div class="col-sm-4">
        <div class="stat-card">
          <i class="fa fa-users"></i>
          <div class="stat-value" id="followers">--</div>
          <div class="stat-label">Followers</div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
        <div class="activity-list" id="activity-list"></div>
      </div>
    </div>
  </div>
  <script src="js/jquery-2.1.3.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
